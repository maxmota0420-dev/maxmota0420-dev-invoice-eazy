<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice-Eazy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#173A5E;
    --navy-dark:#0F2740;
    --red:#C0392B;
    --paper:#FFFFFF;
    --canvas:#E7E9EC;
    --ink:#1B1F24;
    --muted:#6B7280;
    --line:#D8DCE1;
    --focus:#EAF2FB;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--canvas);
    font-family:'Inter',system-ui,sans-serif;
    color:var(--ink);
    min-height:100vh;
  }

  /* ---------- Toolbar ---------- */
  .toolbar{
    position:sticky;top:0;z-index:50;
    background:var(--navy-dark);
    color:#fff;
    padding:12px 20px;
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    box-shadow:0 2px 10px rgba(0,0,0,.2);
  }
  .toolbar .brand{
    font-family:'Oswald',sans-serif;
    font-weight:700;
    letter-spacing:.03em;
    font-size:15px;
    margin-right:auto;
    color:#fff;
  }
  .toolbar .brand span{color:var(--red);}
  .btn{
    appearance:none;
    border:1px solid rgba(255,255,255,.25);
    background:rgba(255,255,255,.06);
    color:#fff;
    padding:8px 14px;
    border-radius:6px;
    font-size:13px;
    font-weight:500;
    cursor:pointer;
    transition:background .15s ease, transform .05s ease;
    white-space:nowrap;
  }
  .btn:hover{background:rgba(255,255,255,.16);}
  .btn:active{transform:translateY(1px);}
  .btn.primary{background:var(--red);border-color:var(--red);}
  .btn.primary:hover{background:#a8321f;}
  .status{
    font-size:12px;
    color:#B9C4D0;
    margin-left:4px;
    min-width:70px;
  }
  .userchip{
    font-size:12px;
    color:#B9C4D0;
    margin-right:4px;
  }

  /* ---------- Auth screen ---------- */
  .auth-wrap{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
  }
  .auth-card{
    background:#fff;
    width:100%;max-width:380px;
    border-radius:10px;
    box-shadow:0 12px 40px rgba(0,0,0,.15);
    padding:36px 32px;
  }
  .auth-logo{
    font-family:'Oswald',sans-serif;
    font-weight:700;
    font-size:28px;
    color:var(--navy);
    margin-bottom:2px;
  }
  .auth-logo span{color:var(--red);}
  .auth-sub{
    font-size:13px;
    color:var(--muted);
    margin-bottom:24px;
  }
  .auth-field{margin-bottom:14px;}
  .auth-field label{
    display:block;
    font-size:12px;
    font-weight:600;
    color:var(--navy);
    margin-bottom:5px;
    letter-spacing:.02em;
  }
  .auth-field input{
    width:100%;
    padding:10px 12px;
    border:1px solid var(--line);
    border-radius:6px;
    font-size:14px;
    font-family:inherit;
  }
  .auth-field input:focus{outline:none;border-color:var(--navy);}
  .auth-submit{
    width:100%;
    background:var(--navy);
    color:#fff;
    border:none;
    padding:11px;
    border-radius:6px;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
    margin-top:6px;
  }
  .auth-submit:hover{background:var(--navy-dark);}
  .auth-forgot{
    text-align:right;
    margin:-6px 0 14px;
  }
  .auth-toggle{
    text-align:center;
    font-size:13px;
    color:var(--muted);
    margin-top:18px;
  }
  .auth-toggle a{color:var(--red);cursor:pointer;font-weight:600;text-decoration:none;}
  .auth-error{
    background:#FDEDEC;
    color:var(--red);
    border:1px solid #F5C6C2;
    padding:8px 12px;
    border-radius:6px;
    font-size:12.5px;
    margin-bottom:14px;
    display:none;
  }

  /* ---------- Page / Sheet ---------- */
  .page-wrap{
    display:none;
    justify-content:center;
    padding:32px 16px 80px;
  }
  .sheet{
    width:100%;
    max-width:820px;
    background:var(--paper);
    box-shadow:0 8px 30px rgba(0,0,0,.12);
    padding:56px 56px 40px;
  }

  input, textarea{
    font-family:inherit;
    color:inherit;
    border:1px solid transparent;
    background:transparent;
    padding:2px 4px;
    border-radius:4px;
    width:100%;
    resize:none;
    outline:none;
  }
  input:hover, textarea:hover{background:var(--focus);}
  input:focus, textarea:focus{
    background:var(--focus);
    border-color:#B9CFE8;
  }
  textarea{overflow:hidden;line-height:1.5;}

  .head-row{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:20px;
    margin-bottom:28px;
  }
  .invoice-title{
    font-family:'Oswald',sans-serif;
    font-weight:700;
    font-size:52px;
    letter-spacing:.01em;
    color:var(--navy);
    line-height:1;
  }
  .logo-slot{
    width:110px;height:90px;
    flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    border:1px dashed var(--line);
    border-radius:6px;
    overflow:hidden;
    background:#FAFBFC;
    text-align:center;
    font-size:11px;
    color:var(--muted);
    padding:6px;
  }
  .logo-slot img{width:100%;height:100%;object-fit:cover;}
  .logo-slot:hover{background:var(--focus);}

  .from-meta-row{
    display:flex;
    justify-content:space-between;
    gap:30px;
    margin-bottom:26px;
  }
  .from-block .biz-name{font-weight:700;font-size:14px;}
  .field-line{margin-bottom:2px;}

  .meta-block{text-align:right;min-width:220px;}
  .bill-invoice-row{
    display:flex;
    justify-content:space-between;
    gap:30px;
    margin-bottom:22px;
    padding-bottom:18px;
    border-bottom:2px solid var(--navy);
  }
  .section-label{
    font-family:'Oswald',sans-serif;
    font-weight:600;
    font-size:13px;
    letter-spacing:.06em;
    color:var(--navy);
    margin-bottom:6px;
  }
  .meta-line{
    display:flex;
    justify-content:space-between;
    gap:16px;
    font-size:13px;
    margin-bottom:3px;
  }
  .meta-line .k{
    font-family:'Oswald',sans-serif;
    font-weight:600;
    font-size:13px;
    letter-spacing:.04em;
    color:var(--navy);
    white-space:nowrap;
  }
  .meta-line input{text-align:right;}

  .items-head{
    display:grid;
    grid-template-columns:50px 1fr 110px 110px 28px;
    gap:8px;
    font-family:'Oswald',sans-serif;
    font-weight:600;
    font-size:12px;
    letter-spacing:.06em;
    color:var(--red);
    border-bottom:2px solid var(--red);
    padding-bottom:8px;
    margin-bottom:6px;
  }
  .items-head span:nth-child(3),
  .items-head span:nth-child(4){text-align:right;}

  .item-row{
    display:grid;
    grid-template-columns:50px 1fr 110px 110px 28px;
    gap:8px;
    align-items:start;
    padding:10px 0;
    border-bottom:1px solid var(--line);
  }
  .item-row input.qty{text-align:center;}
  .item-row input.price{text-align:right;}
  .item-amount{text-align:right;font-size:14px;padding:2px 4px;align-self:center;}
  .remove-row{
    background:none;border:none;color:var(--muted);
    cursor:pointer;font-size:16px;line-height:1;
    align-self:center;padding:4px;
  }
  .remove-row:hover{color:var(--red);}

  .add-row-btn{
    margin-top:14px;
    background:none;
    border:1px dashed var(--line);
    color:var(--navy);
    font-size:13px;
    font-weight:500;
    padding:8px 14px;
    border-radius:6px;
    cursor:pointer;
  }
  .add-row-btn:hover{background:var(--focus);}

  .total-row{
    display:flex;
    justify-content:flex-end;
    align-items:center;
    gap:24px;
    margin-top:22px;
    padding-top:16px;
  }
  .total-label{
    font-family:'Oswald',sans-serif;
    font-weight:700;
    font-size:20px;
    color:var(--navy);
    letter-spacing:.03em;
  }
  .total-amount{
    font-family:'Oswald',sans-serif;
    font-weight:700;
    font-size:26px;
    color:var(--navy);
  }

  .footer-row{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    gap:30px;
    margin-top:56px;
    padding-top:22px;
    border-top:1px solid var(--line);
  }
  .thank-you{
    font-family:'Dancing Script',cursive;
    font-weight:700;
    font-size:44px;
    color:var(--navy);
  }
  .terms-block{max-width:320px;border-left:2px solid var(--red);padding-left:14px;}
  .terms-block textarea{font-size:12.5px;line-height:1.6;color:#333;}

  /* Modal (shared: My Invoices) */
  .modal-backdrop{
    position:fixed;inset:0;
    background:rgba(15,30,50,.55);
    display:none;
    align-items:flex-start;
    justify-content:center;
    padding:60px 16px;
    z-index:100;
  }
  .modal-backdrop.open{display:flex;}
  .modal{
    background:#fff;border-radius:10px;
    width:100%;max-width:560px;max-height:75vh;overflow:auto;
    box-shadow:0 20px 60px rgba(0,0,0,.3);
  }
  .modal-head{
    display:flex;justify-content:space-between;align-items:center;
    padding:16px 20px;border-bottom:1px solid var(--line);
    position:sticky;top:0;background:#fff;
  }
  .modal-head h3{margin:0;font-family:'Oswald',sans-serif;font-size:16px;color:var(--navy);}
  .modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted);}
  .modal-body{padding:8px 12px;}
  .inv-item{
    display:flex;justify-content:space-between;align-items:center;
    padding:12px 10px;border-bottom:1px solid var(--line);
    cursor:pointer;border-radius:6px;
  }
  .inv-item:hover{background:var(--focus);}
  .inv-item .meta{font-size:12px;color:var(--muted);}
  .inv-item .name{font-weight:600;font-size:14px;}
  .inv-item .amt{font-family:'Oswald',sans-serif;font-weight:600;color:var(--navy);}
  .inv-item .del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;margin-left:10px;}
  .inv-item .del:hover{color:var(--red);}
  .empty-state{padding:30px 20px;text-align:center;color:var(--muted);font-size:13px;}

  @media print{
    body{background:#fff;}
    .toolbar, .modal-backdrop, .add-row-btn, .remove-row, .logo-slot.empty-hint{display:none !important;}
    .page-wrap{padding:0;}
    .sheet{box-shadow:none;padding:20px 10px;max-width:100%;}
    input, textarea{border-color:transparent !important;background:transparent !important;}
  }

  @media (max-width:640px){
    .sheet{padding:28px 20px;}
    .invoice-title{font-size:38px;}
    .from-meta-row, .bill-invoice-row, .footer-row{flex-direction:column;}
    .meta-block{text-align:left;}
    .meta-line{justify-content:flex-start;gap:8px;}
    .meta-line input{text-align:left;}
    .items-head, .item-row{grid-template-columns:36px 1fr 80px 80px 20px;font-size:11px;}
    .terms-block{border-left:none;border-top:2px solid var(--red);padding-left:0;padding-top:12px;max-width:100%;}
    .thank-you{font-size:34px;}
  }
</style>
</head>
<body>

<!-- ===================== AUTH SCREEN ===================== -->
<div class="auth-wrap" id="authWrap">
  <div class="auth-card">
    <div class="auth-logo">Invoice<span>-Eazy</span></div>
    <div class="auth-sub" id="authSub">Sign in to your account</div>
    <div class="auth-error" id="authError"></div>

    <!-- login / signup fields -->
    <div id="loginSignupFields">
      <div class="auth-field">
        <label>Email</label>
        <input type="email" id="authEmail" autocomplete="username">
      </div>
      <div class="auth-field">
        <label>Password</label>
        <input type="password" id="authPassword" autocomplete="current-password">
      </div>
      <div class="auth-forgot" id="authForgotRow">
        <a onclick="showForgotView()" style="font-size:12.5px;color:var(--muted);cursor:pointer;text-decoration:none;">Forgot password?</a>
      </div>
      <button class="auth-submit" id="authSubmitBtn" onclick="submitAuth()">Sign in</button>
      <div class="auth-toggle" id="authToggle">
        New here? <a onclick="toggleAuthMode()">Create an account</a>
      </div>
    </div>

    <!-- forgot password: request link -->
    <div id="forgotFields" style="display:none;">
      <div class="auth-field">
        <label>Email</label>
        <input type="email" id="forgotEmail" autocomplete="username">
      </div>
      <button class="auth-submit" onclick="submitForgotPassword()">Send reset link</button>
      <div class="auth-toggle"><a onclick="showLoginView()">Back to sign in</a></div>
    </div>

    <!-- reset password: set new password (arrives via ?reset=TOKEN link) -->
    <div id="resetFields" style="display:none;">
      <div class="auth-field">
        <label>New password</label>
        <input type="password" id="resetPassword1" autocomplete="new-password">
      </div>
      <div class="auth-field">
        <label>Confirm new password</label>
        <input type="password" id="resetPassword2" autocomplete="new-password">
      </div>
      <button class="auth-submit" onclick="submitResetPassword()">Set new password</button>
      <div class="auth-toggle"><a onclick="showLoginView()">Back to sign in</a></div>
    </div>
  </div>
</div>

<!-- ===================== APP ===================== -->
<div class="toolbar" style="display:none;" id="toolbar">
  <span class="brand">Invoice<span>-Eazy</span></span>
  <span class="userchip" id="userChip"></span>
  <span class="status" id="statusText"></span>
  <button class="btn" onclick="newInvoice()">New</button>
  <button class="btn" onclick="openInvoiceList()">My Invoices</button>
  <button class="btn primary" onclick="saveInvoice()">Save</button>
  <button class="btn" onclick="window.print()">Print / Save PDF</button>
  <button class="btn" onclick="logout()">Sign out</button>
</div>

<div class="page-wrap" id="pageWrap">
  <div class="sheet" id="sheet">

    <div class="head-row">
      <div><div class="invoice-title">INVOICE</div></div>
      <div class="logo-slot empty-hint" id="logoSlot" onclick="document.getElementById('logoInput').click()">
        <span id="logoPlaceholder">Click to add logo</span>
        <img id="logoImg" style="display:none;">
      </div>
      <input type="file" id="logoInput" accept="image/*" style="display:none;">
    </div>

    <div class="from-meta-row">
      <div class="from-block" style="max-width:340px;">
        <input class="field-line biz-name" id="bizName" placeholder="Business Name" value="">
        <input class="field-line" id="bizTagline" placeholder="Business tagline / type of work" value="">
        <input class="field-line" id="bizAddr1" placeholder="Street address" value="">
        <input class="field-line" id="bizAddr2" placeholder="City, State ZIP" value="">
        <input class="field-line" id="bizPhone" placeholder="Phone number" value="">
        <input class="field-line" id="bizEmail" placeholder="Email address" value="">
      </div>
    </div>

    <div class="bill-invoice-row">
      <div style="max-width:280px;">
        <div class="section-label">BILL TO</div>
        <input class="field-line" id="clientName" placeholder="Client name" value="">
        <input class="field-line" id="clientAddr1" placeholder="Street address" value="">
        <input class="field-line" id="clientAddr2" placeholder="City, State ZIP" value="">
        <input class="field-line" id="clientPhone" placeholder="Phone number" value="">
      </div>
      <div class="meta-block">
        <div class="meta-line"><span class="k">INVOICE #</span><input id="invoiceNumber" placeholder="000" value=""></div>
        <div class="meta-line"><span class="k">INVOICE DATE</span><input id="invoiceDate" type="date" value=""></div>
      </div>
    </div>

    <div class="items-head">
      <span>QTY</span><span>DESCRIPTION</span><span>UNIT PRICE</span><span>AMOUNT</span><span></span>
    </div>
    <div id="itemsBody"></div>
    <button class="add-row-btn" onclick="addItem()">+ Add line item</button>

    <div class="total-row">
      <span class="total-label">TOTAL</span>
      <span class="total-amount" id="totalAmount">$0.00</span>
    </div>

    <div class="footer-row">
      <div class="thank-you">Thank you</div>
      <div class="terms-block">
        <div class="section-label" style="color:var(--red);">TERMS &amp; CONDITIONS</div>
        <textarea id="terms" rows="4" placeholder="Payment is due upon receipt&#10;Zelle / Venmo / etc.">Payment is due upon receipt</textarea>
      </div>
    </div>

  </div>
</div>

<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal">
    <div class="modal-head">
      <h3>My Invoices</h3>
      <button class="modal-close" onclick="closeInvoiceList()">&times;</button>
    </div>
    <div class="modal-body" id="invoiceListBody">
      <div class="empty-state">Loading…</div>
    </div>
  </div>
</div>

<script>
/* =========================================================
   CONFIG — replace with your deployed Worker URL
   e.g. "https://invoice-eazy-api.yoursubdomain.workers.dev"
   ========================================================= */
const API_BASE = "https://invoice-eazy-api.maxmota0420.workers.dev";

let currentId = null;
let items = [];
let itemIdCounter = 0;
let authMode = 'login'; // or 'signup'
let sessionToken = localStorage.getItem('invoiceEazyToken') || null;
let currentUserEmail = null;

/* ---------------- AUTH ---------------- */

function toggleAuthMode(){
  authMode = authMode === 'login' ? 'signup' : 'login';
  document.getElementById('authSub').textContent = authMode === 'login' ? 'Sign in to your account' : 'Create your account';
  document.getElementById('authSubmitBtn').textContent = authMode === 'login' ? 'Sign in' : 'Create account';
  document.getElementById('authToggle').innerHTML = authMode === 'login'
    ? 'New here? <a onclick="toggleAuthMode()">Create an account</a>'
    : 'Already have an account? <a onclick="toggleAuthMode()">Sign in</a>';
  document.getElementById('authForgotRow').style.display = authMode === 'login' ? 'block' : 'none';
  document.getElementById('authError').style.display = 'none';
}

function showAuthError(msg){
  const el = document.getElementById('authError');
  el.textContent = msg;
  el.style.display = 'block';
}

function hideAuthError(){
  document.getElementById('authError').style.display = 'none';
}

function showLoginView(){
  authMode = 'login';
  document.getElementById('loginSignupFields').style.display = 'block';
  document.getElementById('forgotFields').style.display = 'none';
  document.getElementById('resetFields').style.display = 'none';
  document.getElementById('authSub').textContent = 'Sign in to your account';
  document.getElementById('authSubmitBtn').textContent = 'Sign in';
  document.getElementById('authToggle').innerHTML = 'New here? <a onclick="toggleAuthMode()">Create an account</a>';
  hideAuthError();
}

function showForgotView(){
  document.getElementById('loginSignupFields').style.display = 'none';
  document.getElementById('forgotFields').style.display = 'block';
  document.getElementById('resetFields').style.display = 'none';
  document.getElementById('authSub').textContent = "We'll email you a reset link";
  document.getElementById('forgotEmail').value = document.getElementById('authEmail').value || '';
  hideAuthError();
}

function showResetView(){
  document.getElementById('loginSignupFields').style.display = 'none';
  document.getElementById('forgotFields').style.display = 'none';
  document.getElementById('resetFields').style.display = 'block';
  document.getElementById('authSub').textContent = 'Choose a new password';
  hideAuthError();
}

async function submitForgotPassword(){
  const email = document.getElementById('forgotEmail').value.trim();
  if(!email){ showAuthError('Enter your email.'); return; }
  if(API_BASE.includes('REPLACE-WITH-YOUR-WORKER-URL')){ showAuthError('Set API_BASE in the code first.'); return; }
  try{
    const res = await fetch(API_BASE + '/api/auth/forgot-password', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ email })
    });
    const data = await res.json();
    hideAuthError();
    document.getElementById('authSub').textContent = data.message || 'If that email has an account, a reset link is on its way.';
    document.getElementById('forgotFields').innerHTML = '<div class="auth-toggle"><a onclick="showLoginView()">Back to sign in</a></div>';
  }catch(err){
    showAuthError('Could not reach the server. Try again.');
  }
}

let resetToken = null;

async function submitResetPassword(){
  const p1 = document.getElementById('resetPassword1').value;
  const p2 = document.getElementById('resetPassword2').value;
  if(!p1 || p1.length < 6){ showAuthError('Password must be at least 6 characters.'); return; }
  if(p1 !== p2){ showAuthError('Passwords do not match.'); return; }
  try{
    const res = await fetch(API_BASE + '/api/auth/reset-password', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ token: resetToken, password: p1 })
    });
    const data = await res.json();
    if(!res.ok){ showAuthError(data.error || 'Could not reset password.'); return; }
    // clear any local session on this device, since the server just invalidated all sessions
    sessionToken = null;
    localStorage.removeItem('invoiceEazyToken');
    // clean the reset token out of the URL, then send them to sign in
    const cleanUrl = window.location.origin + window.location.pathname;
    window.history.replaceState({}, document.title, cleanUrl);
    document.getElementById('resetFields').innerHTML = '<div class="auth-toggle" style="color:var(--navy);font-weight:600;">Password updated, and you\'ve been signed out everywhere for security. <a onclick="showLoginView()">Sign in</a></div>';
  }catch(err){
    showAuthError('Could not reach the server. Try again.');
  }
}

async function submitAuth(){
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  if(!email || !password){ showAuthError('Enter your email and password.'); return; }
  if(API_BASE.includes('REPLACE-WITH-YOUR-WORKER-URL')){
    showAuthError('Set API_BASE in the code before signing in.');
    return;
  }
  const endpoint = authMode === 'login' ? '/api/auth/login' : '/api/auth/signup';
  try{
    const res = await fetch(API_BASE + endpoint, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if(!res.ok){ showAuthError(data.error || 'Something went wrong.'); return; }
    sessionToken = data.token;
    currentUserEmail = data.email;
    localStorage.setItem('invoiceEazyToken', sessionToken);
    enterApp(data.business);
  }catch(err){
    showAuthError('Could not reach the server. Check your connection.');
  }
}

function enterApp(business){
  document.getElementById('authWrap').style.display = 'none';
  document.getElementById('toolbar').style.display = 'flex';
  document.getElementById('pageWrap').style.display = 'flex';
  document.getElementById('userChip').textContent = currentUserEmail || '';
  newInvoice();
  if(business) applyBusinessDefaults(business);
}

async function tryResumeSession(){
  if(!sessionToken || API_BASE.includes('REPLACE-WITH-YOUR-WORKER-URL')) return;
  try{
    const res = await fetch(API_BASE + '/api/auth/me', {
      headers: { 'Authorization': 'Bearer ' + sessionToken }
    });
    if(!res.ok){ sessionToken = null; localStorage.removeItem('invoiceEazyToken'); return; }
    const data = await res.json();
    currentUserEmail = data.email;
    enterApp(data.business);
  }catch(err){ /* stay on login screen */ }
}

async function logout(){
  try{
    await fetch(API_BASE + '/api/auth/logout', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + sessionToken }
    });
  }catch(err){}
  sessionToken = null;
  currentUserEmail = null;
  localStorage.removeItem('invoiceEazyToken');
  document.getElementById('toolbar').style.display = 'none';
  document.getElementById('pageWrap').style.display = 'none';
  document.getElementById('authWrap').style.display = 'flex';
  document.getElementById('authEmail').value = '';
  document.getElementById('authPassword').value = '';
}

function applyBusinessDefaults(business){
  if(!business) return;
  document.getElementById('bizName').value = business.name || '';
  document.getElementById('bizTagline').value = business.tagline || '';
  document.getElementById('bizAddr1').value = business.addr1 || '';
  document.getElementById('bizAddr2').value = business.addr2 || '';
  document.getElementById('bizPhone').value = business.phone || '';
  document.getElementById('bizEmail').value = business.email || '';
  if(business.logo){
    document.getElementById('logoImg').src = business.logo;
    document.getElementById('logoImg').style.display = 'block';
    document.getElementById('logoPlaceholder').style.display = 'none';
  }
}

async function saveProfileDefaults(){
  if(!sessionToken) return;
  const business = {
    name: document.getElementById('bizName').value,
    tagline: document.getElementById('bizTagline').value,
    addr1: document.getElementById('bizAddr1').value,
    addr2: document.getElementById('bizAddr2').value,
    phone: document.getElementById('bizPhone').value,
    email: document.getElementById('bizEmail').value,
    logo: (document.getElementById('logoImg').style.display !== 'none') ? document.getElementById('logoImg').src : ''
  };
  try{
    await fetch(API_BASE + '/api/profile', {
      method: 'PUT',
      headers: { 'Content-Type':'application/json', 'Authorization': 'Bearer ' + sessionToken },
      body: JSON.stringify(business)
    });
  }catch(err){ /* non-fatal */ }
}

/* ---------------- ITEMS / INVOICE BUILDER ---------------- */

function uid(){ return 'row_' + (itemIdCounter++); }

function addItem(qty=1, description='', unitPrice=''){
  items.push({ id: uid(), qty, description, unitPrice });
  renderItems();
}

function removeItem(id){
  items = items.filter(i => i.id !== id);
  if(items.length === 0) addItem();
  else renderItems();
}

function formatMoney(n){
  n = isNaN(n) ? 0 : n;
  return '$' + n.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
}

function recalcTotal(){
  let total = 0;
  items.forEach(i => {
    const qty = parseFloat(i.qty) || 0;
    const price = parseFloat(i.unitPrice) || 0;
    total += qty * price;
  });
  document.getElementById('totalAmount').textContent = formatMoney(total);
  return total;
}

function autoGrow(el){
  el.style.height = 'auto';
  el.style.height = (el.scrollHeight) + 'px';
}

function renderItems(){
  const body = document.getElementById('itemsBody');
  body.innerHTML = '';
  items.forEach(item => {
    const row = document.createElement('div');
    row.className = 'item-row';
    row.innerHTML = `
      <input class="qty" type="text" value="${item.qty ?? ''}" data-field="qty">
      <textarea rows="1" data-field="description" placeholder="Describe the work...">${item.description ?? ''}</textarea>
      <input class="price" type="text" value="${item.unitPrice ?? ''}" data-field="unitPrice" placeholder="0.00">
      <div class="item-amount">${formatMoney((parseFloat(item.qty)||0) * (parseFloat(item.unitPrice)||0))}</div>
      <button class="remove-row" title="Remove line" onclick="removeItem('${item.id}')">&times;</button>
    `;
    const qtyInput = row.querySelector('[data-field="qty"]');
    const descInput = row.querySelector('[data-field="description"]');
    const priceInput = row.querySelector('[data-field="unitPrice"]');
    const amountEl = row.querySelector('.item-amount');

    function sync(){
      item.qty = qtyInput.value;
      item.description = descInput.value;
      item.unitPrice = priceInput.value;
      amountEl.textContent = formatMoney((parseFloat(item.qty)||0) * (parseFloat(item.unitPrice)||0));
      recalcTotal();
    }
    qtyInput.addEventListener('input', sync);
    priceInput.addEventListener('input', sync);
    descInput.addEventListener('input', () => { autoGrow(descInput); sync(); });

    body.appendChild(row);
    autoGrow(descInput);
  });
  recalcTotal();
}

function todayISO(){
  const d = new Date();
  return d.toISOString().slice(0,10);
}

function newInvoice(){
  currentId = null;
  itemIdCounter = 0;
  const keepBusiness = {
    name: document.getElementById('bizName')?.value || '',
    tagline: document.getElementById('bizTagline')?.value || '',
    addr1: document.getElementById('bizAddr1')?.value || '',
    addr2: document.getElementById('bizAddr2')?.value || '',
    phone: document.getElementById('bizPhone')?.value || '',
    email: document.getElementById('bizEmail')?.value || '',
    logo: document.getElementById('logoImg')?.src || ''
  };
  ['clientName','clientAddr1','clientAddr2','clientPhone','invoiceNumber'].forEach(id=>{
    document.getElementById(id).value = '';
  });
  document.getElementById('invoiceDate').value = todayISO();
  document.getElementById('terms').value = 'Payment is due upon receipt';
  items = [];
  addItem();
  setStatus('');
  // business branding carries over automatically between invoices
  applyBusinessDefaults(keepBusiness);
}

function collectData(){
  return {
    id: currentId,
    business: {
      name: document.getElementById('bizName').value,
      tagline: document.getElementById('bizTagline').value,
      addr1: document.getElementById('bizAddr1').value,
      addr2: document.getElementById('bizAddr2').value,
      phone: document.getElementById('bizPhone').value,
      email: document.getElementById('bizEmail').value,
      logo: document.getElementById('logoImg').style.display !== 'none' ? document.getElementById('logoImg').src : ''
    },
    client: {
      name: document.getElementById('clientName').value,
      addr1: document.getElementById('clientAddr1').value,
      addr2: document.getElementById('clientAddr2').value,
      phone: document.getElementById('clientPhone').value,
    },
    invoiceNumber: document.getElementById('invoiceNumber').value,
    invoiceDate: document.getElementById('invoiceDate').value,
    items: items,
    terms: document.getElementById('terms').value,
    total: recalcTotal(),
  };
}

function populateData(data){
  currentId = data.id || null;
  applyBusinessDefaults(data.business);
  document.getElementById('clientName').value = data.client?.name || '';
  document.getElementById('clientAddr1').value = data.client?.addr1 || '';
  document.getElementById('clientAddr2').value = data.client?.addr2 || '';
  document.getElementById('clientPhone').value = data.client?.phone || '';
  document.getElementById('invoiceNumber').value = data.invoiceNumber || '';
  document.getElementById('invoiceDate').value = data.invoiceDate || todayISO();
  document.getElementById('terms').value = data.terms || 'Payment is due upon receipt';
  items = (data.items && data.items.length) ? data.items.map(i => ({...i, id: uid()})) : [];
  if(items.length === 0) addItem(); else renderItems();
}

function setStatus(msg, isError){
  const el = document.getElementById('statusText');
  el.textContent = msg;
  el.style.color = isError ? '#F5A3A3' : '#B9C4D0';
}

async function saveInvoice(){
  if(!sessionToken){ setStatus('Sign in to save', true); return; }
  setStatus('Saving…');
  try{
    const data = collectData();
    const res = await fetch(API_BASE + '/api/invoices', {
      method: 'POST',
      headers: { 'Content-Type':'application/json', 'Authorization': 'Bearer ' + sessionToken },
      body: JSON.stringify(data)
    });
    if(!res.ok) throw new Error('Save failed');
    const saved = await res.json();
    currentId = saved.id;
    await saveProfileDefaults(); // remembers your branding/style for next time
    setStatus('Saved ✓');
  }catch(err){
    setStatus('Save failed', true);
  }
}

async function openInvoiceList(){
  document.getElementById('modalBackdrop').classList.add('open');
  const body = document.getElementById('invoiceListBody');
  body.innerHTML = '<div class="empty-state">Loading…</div>';
  try{
    const res = await fetch(API_BASE + '/api/invoices', {
      headers: { 'Authorization': 'Bearer ' + sessionToken }
    });
    const list = await res.json();
    if(!list.length){
      body.innerHTML = '<div class="empty-state">No saved invoices yet.</div>';
      return;
    }
    body.innerHTML = '';
    list.forEach(inv => {
      const row = document.createElement('div');
      row.className = 'inv-item';
      row.innerHTML = `
        <div onclick="loadInvoice('${inv.id}')" style="flex:1;cursor:pointer;">
          <div class="name">${inv.clientName || 'Untitled client'}</div>
          <div class="meta">#${inv.invoiceNumber || '—'} · ${inv.invoiceDate || ''}</div>
        </div>
        <span class="amt">${formatMoney(inv.total || 0)}</span>
        <button class="del" onclick="deleteInvoice(event, '${inv.id}')">Delete</button>
      `;
      body.appendChild(row);
    });
  }catch(err){
    body.innerHTML = '<div class="empty-state">Could not load invoices.</div>';
  }
}

function closeInvoiceList(){
  document.getElementById('modalBackdrop').classList.remove('open');
}

async function loadInvoice(id){
  try{
    const res = await fetch(API_BASE + '/api/invoices/' + id, {
      headers: { 'Authorization': 'Bearer ' + sessionToken }
    });
    const data = await res.json();
    populateData(data);
    closeInvoiceList();
    setStatus('Loaded');
  }catch(err){
    setStatus('Load failed', true);
  }
}

async function deleteInvoice(e, id){
  e.stopPropagation();
  if(!confirm('Delete this invoice? This cannot be undone.')) return;
  try{
    await fetch(API_BASE + '/api/invoices/' + id, {
      method:'DELETE',
      headers: { 'Authorization': 'Bearer ' + sessionToken }
    });
    openInvoiceList();
  }catch(err){
    alert('Delete failed');
  }
}

document.getElementById('logoInput').addEventListener('change', function(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(evt){
    document.getElementById('logoImg').src = evt.target.result;
    document.getElementById('logoImg').style.display = 'block';
    document.getElementById('logoPlaceholder').style.display = 'none';
  };
  reader.readAsDataURL(file);
});

document.getElementById('modalBackdrop').addEventListener('click', function(e){
  if(e.target === this) closeInvoiceList();
});

document.getElementById('authPassword').addEventListener('keydown', function(e){
  if(e.key === 'Enter') submitAuth();
});

// init
document.getElementById('invoiceDate').value = todayISO();
const urlParams = new URLSearchParams(window.location.search);
const tokenFromUrl = urlParams.get('reset');
if(tokenFromUrl){
  resetToken = tokenFromUrl;
  showResetView();
} else {
  tryResumeSession();
}
</script>
